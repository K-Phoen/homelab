apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
spec:
  replicas: 1
  revisionHistoryLimit: 3

  strategy:
    type: "Recreate"

  selector:
    matchLabels:
      app: forgejo

  template:
    metadata:
      {{ if .Values.anubis.enable }}
      annotations:
        k8s.grafana.com/scrape: 'true'
        k8s.grafana.com/metrics.portNumber: '9090'
        k8s.grafana.com/metrics.scrapeInterval: '30s'
        k8s.grafana.com/job: 'integrations/anubis-forgejo'
      {{ end }}
      labels:
        app: forgejo
    spec:
      automountServiceAccountToken: false

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: disktype
                    operator: In
                    values: [ssd]

      terminationGracePeriodSeconds: 30

      containers:
        {{ if .Values.anubis.enable }}
        - name: anubis
          image: {{ .Values.anubis.image }}:{{ .Values.anubis.tag }}
          ports:
            - name: anubis
              containerPort: 8081
          env:
            - name: "BIND"
              value: ":8081"
            - name: "DIFFICULTY"
              value: "4"
            - name: ED25519_PRIVATE_KEY_HEX
              valueFrom:
                secretKeyRef:
                  name: anubis-private-key
                  key: password
            - name: "METRICS_BIND"
              value: ":9090"
            - name: "SERVE_ROBOTS_TXT"
              value: "true"
            - name: "TARGET"
              value: "http://localhost:3000"
            - name: "OG_PASSTHROUGH"
              value: "true"
            - name: "OG_EXPIRY_TIME"
              value: "24h"
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        {{ end }}
        - name: forgejo
          image: {{ .Values.forgejo.image }}:{{ .Values.forgejo.tag }}
          env:
            # Misc
            - name: FORGEJO_TEMP
              value: /tmp/forgejo
            - name: FORGEJO__log__LEVEL
              value: Warn # https://forgejo.org/docs/latest/admin/config-cheat-sheet/#log-log
            - name: FORGEJO__server__PUBLIC_URL_DETECTION
              value: auto
            - name: FORGEJO__server__SSH_DOMAIN
              value: git-ssh.kevingomez.fr
            - name: FORGEJO__server__SSH_PORT
              value: '22'
            - name: FORGEJO__server__SSH_LISTEN_PORT
              value: '2222'

            # Metrics - https://forgejo.org/docs/latest/admin/config-cheat-sheet/#metrics-metrics
            - name: FORGEJO__metrics__ENABLED
              value: 'true'
            - name: FORGEJO__metrics__ENABLED_ISSUE_BY_LABEL
              value: 'true'
            - name: FORGEJO__metrics__ENABLED_ISSUE_BY_REPOSITORY
              value: 'true'
            - name: FORGEJO__metrics__TOKEN
              valueFrom:
                secretKeyRef:
                  name: metrics-token
                  key: password

            # Service - https://forgejo.org/docs/latest/admin/config-cheat-sheet/#service-service
            - name: FORGEJO__SERVICE__DISABLE_REGISTRATION
              value: "false"
            - name: FORGEJO__SERVICE__ENABLE_BASIC_AUTHENTICATION
              value: "true"
            - name: FORGEJO__SERVICE__DEFAULT_KEEP_EMAIL_PRIVATE
              value: "true"
            - name: FORGEJO__SERVICE__DEFAULT_ALLOW_CREATE_ORGANIZATION
              value: "false"

            # Service Explore - https://forgejo.org/docs/latest/admin/config-cheat-sheet/#service---explore-serviceexplore
            - name: FORGEJO__service.explore__DISABLE_USERS_PAGE
              value: "true"

            # Repository
            - name: FORGEJO__repository__DISABLED_REPO_UNITS
              value: "repo.packages"
            - name: FORGEJO__repository__MAX_CREATION_LIMIT
              value: "0"
            - name: FORGEJO__repository__ALLOW_FORK_WITHOUT_MAXIMUM_LIMIT
              value: "false"

            # OpenID
            - name: FORGEJO__openid__ENABLE_OPENID_SIGNIN
              value: 'false'
            - name: FORGEJO__openid__ENABLE_OPENID_SIGNUP
              value: 'false'

            # Database
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: postgres:5432
            - name: FORGEJO__database__NAME
              value: forgejo
            - name: FORGEJO__database__USER
              value: forgejo
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: password

            # Mailer
            - name: FORGEJO__mailer__ENABLED
              value: "true"
            - name: FORGEJO__mailer__FROM
              value: noreply@git.kevingomez.fr
            - name: FORGEJO__mailer__PROTOCOL
              value: "smtp+starttls"
            - name: FORGEJO__mailer__SMTP_ADDR
              value: smtp.fastmail.com
            - name: FORGEJO__mailer__SMTP_PORT
              value: "587"
            - name: FORGEJO__mailer__USER
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: username
            - name: FORGEJO__mailer__PASSWD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: password
          resources:
            requests:
              memory: "264Mi"
              cpu: "20m"

          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 2222

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 10

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3

          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea
            - name: config
              mountPath: /etc/gitea
            - name: temp
              mountPath: /tmp

      volumes:
        - name: data
          nfs:
            server: beet.lab
            path: /mnt/main/forgejo
        - name: config
          persistentVolumeClaim:
            claimName: forgejo-config
        - name: temp
          emptyDir: {}
